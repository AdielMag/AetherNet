name: Publish NuGet

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.2.0). Leave empty to auto-increment patch."
        required: false
        default: ""

permissions:
  contents: write   # needed to create and push the version tag
  packages: write   # needed to publish to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for tag lookup and Source Link

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
            BASE=${LATEST#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Tag the release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ── AetherNet.Shared ────────────────────────────────────────────────────
      - name: Restore AetherNet.Shared
        run: dotnet restore src/AetherNet.Shared/AetherNet.Shared.csproj

      - name: Pack AetherNet.Shared
        run: >
          dotnet pack src/AetherNet.Shared/AetherNet.Shared.csproj
          -c Release -o nupkg
          /p:Version=${{ steps.version.outputs.VERSION }}
          --no-restore

      # ── AetherNet.Unity (source-only, depends on AetherNet.Shared) ──────────
      - name: Add local NuGet source so AetherNet.Unity can resolve AetherNet.Shared
        run: dotnet nuget add source ${{ github.workspace }}/nupkg --name local-build

      - name: Restore AetherNet.Unity
        run: >
          dotnet restore src/AetherNet.Unity/AetherNet.Unity.csproj
          /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack AetherNet.Unity
        run: >
          dotnet pack src/AetherNet.Unity/AetherNet.Unity.csproj
          -c Release -o nupkg
          /p:Version=${{ steps.version.outputs.VERSION }}
          --no-restore

      # ── Push both packages ──────────────────────────────────────────────────
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "nupkg/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source github \
            --skip-duplicate

      # ── Create GitHub Release so repo sidebar links to each release ─────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.VERSION }}" \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --notes "## NuGet packages

          - [AetherNet.Shared ${{ steps.version.outputs.VERSION }}](https://www.nuget.org/packages/AetherNet.Shared/${{ steps.version.outputs.VERSION }})
          - [AetherNet.Unity ${{ steps.version.outputs.VERSION }}](https://www.nuget.org/packages/AetherNet.Unity/${{ steps.version.outputs.VERSION }})" \
            nupkg/AetherNet.Shared.${{ steps.version.outputs.VERSION }}.nupkg \
            nupkg/AetherNet.Unity.${{ steps.version.outputs.VERSION }}.nupkg

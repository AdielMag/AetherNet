name: Publish NuGet

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.2.0). Leave empty to auto-increment patch."
        required: false
        default: ""

permissions:
  contents: write  # needed to create and push the version tag

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for tag lookup and Source Link

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Find the latest semver tag (vMAJOR.MINOR.PATCH)
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi
            # Strip v prefix and increment patch
            BASE=${LATEST#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Tag the release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/AetherNet.Shared/AetherNet.Shared.csproj

      - name: Pack
        run: >
          dotnet pack src/AetherNet.Shared/AetherNet.Shared.csproj
          -c Release
          -o nupkg
          /p:Version=${{ steps.version.outputs.VERSION }}
          --no-restore

      - name: Push to NuGet.org
        run: >
          dotnet nuget push nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
